name: gympix
description: "App de gestão de cobranças e mensalidades para academia."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.0
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  go_router: ^16.0.0
  share_plus: ^11.0.0
  flutter_local_notifications: ^19.4.2
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  intl: ^0.20.0
  pdf: ^3.11.3
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo-gympix-colorida.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo-gympix-colorida.png"
  adaptive_icon_monochrome: "assets/images/logo-gympix-pb.png"

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^3.0.0
  riverpod_lint: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
